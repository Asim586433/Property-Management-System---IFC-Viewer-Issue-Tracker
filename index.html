<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PropertyPulse — IFC Viewer & Issue Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c14;--sf:#0f1520;--sf2:#151d2e;--sf3:#1a2540;
  --bd:#1e2a42;--bd2:#2a3a58;
  --ac:#3b82f6;--ac2:#2563eb;--acg:rgba(59,130,246,.12);
  --gn:#22c55e;--yw:#eab308;--rd:#ef4444;--or:#f97316;
  --tx:#e2e8f0;--tx2:#94a3b8;--tx3:#64748b;
  --r:8px;--rl:12px;--tr:.2s ease;
  --font:'Inter',system-ui,sans-serif
}
html,body,#app{height:100%;font-family:var(--font);background:var(--bg);color:var(--tx)}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
::placeholder{color:var(--tx3)}

.lp{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background:linear-gradient(145deg,#080c14,#0f1d35,#0a1628)}
.lc{background:var(--sf);border:1px solid var(--bd);border-radius:20px;
  padding:44px 40px;width:100%;max-width:420px;text-align:center;
  box-shadow:0 24px 80px rgba(0,0,0,.5)}
.lc-ico{font-size:44px;margin-bottom:6px}
.lc h1{font-size:1.7rem;font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(135deg,var(--tx),var(--ac));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent}
.lc-sub{color:var(--tx3);font-size:.88rem;margin:4px 0 32px}
.lc form{display:flex;flex-direction:column;gap:12px;text-align:left}
.fg label{display:block;font-size:.75rem;font-weight:600;color:var(--tx2);
  margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.fi{width:100%;padding:12px 14px;border-radius:var(--r);border:1px solid var(--bd);
  background:var(--bg);color:var(--tx);font-size:.92rem;outline:none;transition:var(--tr)}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acg)}
.btn{padding:12px 20px;border-radius:var(--r);border:none;font-weight:600;
  font-size:.9rem;transition:var(--tr);display:inline-flex;align-items:center;
  justify-content:center;gap:6px}
.btn-p{background:var(--ac);color:#fff}.btn-p:hover{background:var(--ac2)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-o{background:transparent;color:var(--ac);border:1px solid var(--ac)}
.btn-o:hover{background:var(--acg)}
.btn-d{background:transparent;color:var(--rd);border:1px solid rgba(239,68,68,.25)}
.btn-d:hover{background:rgba(239,68,68,.1)}
.btn-s{background:transparent;color:var(--tx2);border:1px solid var(--bd)}
.btn-s:hover{background:var(--sf2);border-color:var(--bd2)}
.btn-f{width:100%}
.err{color:var(--rd);font-size:.82rem;padding:8px 12px;background:rgba(239,68,68,.08);
  border-radius:var(--r);border:1px solid rgba(239,68,68,.15);margin-top:4px}
.lc-foot{margin-top:20px;font-size:.82rem;color:var(--tx3)}
.lc-foot button{background:none;border:none;color:var(--ac);font-weight:600;font-size:.82rem;cursor:pointer}
.lc-demo{margin-top:20px;padding:12px;background:var(--bg);border-radius:var(--r);border:1px solid var(--bd)}
.lc-demo p{font-size:.72rem;color:var(--tx3);margin-bottom:4px;text-transform:uppercase;
  letter-spacing:.05em;font-weight:600}
.lc-demo code{font-size:.78rem;color:var(--gn);font-family:'SF Mono',monospace}

.dash{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:54px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-m{background:none;border:none;color:var(--tx);font-size:1.2rem;padding:4px 8px;
  border-radius:6px;transition:var(--tr)}.hdr-m:hover{background:var(--sf2)}
.hdr-t{font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px}
.hdr-r{display:flex;align-items:center;gap:14px}
.hdr-u{font-size:.82rem;color:var(--tx2)}
.hdr-lb{background:none;border:1px solid var(--bd);color:var(--tx2);padding:6px 14px;
  border-radius:6px;font-size:.78rem;transition:var(--tr);cursor:pointer}
.hdr-lb:hover{border-color:var(--rd);color:var(--rd)}
.main{display:flex;flex:1;overflow:hidden}
.vw-wrap{flex:1;position:relative;min-width:0}
#viewer{width:100%;height:100%;display:block}
.sb{width:400px;max-width:45vw;border-left:1px solid var(--bd);background:var(--sf);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sb-hd{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--bd)}
.sb-hd h2{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.sb-hd .cnt{font-size:.72rem;background:var(--acg);color:var(--ac);padding:2px 8px;
  border-radius:10px;font-weight:600}
.flt{display:flex;gap:4px;padding:10px 16px;border-bottom:1px solid var(--bd);overflow-x:auto}
.flt-b{padding:5px 12px;border-radius:16px;border:1px solid var(--bd);background:transparent;
  color:var(--tx3);font-size:.72rem;white-space:nowrap;text-transform:capitalize;
  font-weight:500;transition:var(--tr);cursor:pointer}
.flt-b.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.flt-b:hover:not(.on){border-color:var(--bd2);color:var(--tx2)}
.il{flex:1;overflow-y:auto;padding:8px}
.il-empty{text-align:center;color:var(--tx3);padding:48px 20px;font-size:.85rem}
.ic{padding:14px;border-radius:var(--r);border:1px solid var(--bd);margin-bottom:8px;
  cursor:pointer;transition:var(--tr)}
.ic:hover{border-color:var(--ac);background:var(--sf2)}
.ic-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ic h3{font-size:.86rem;font-weight:600;line-height:1.35;margin-bottom:6px}
.ic-d{font-size:.76rem;color:var(--tx3);line-height:1.45;margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ic-m{display:flex;justify-content:space-between;align-items:center;font-size:.7rem;color:var(--tx3)}
.badge{padding:3px 10px;border-radius:12px;font-size:.66rem;font-weight:600;
  color:#fff;text-transform:capitalize;letter-spacing:.02em}
.b-open{background:var(--ac)}.b-in_progress{background:var(--yw);color:#1a1a1a}
.b-resolved{background:var(--gn);color:#1a1a1a}.b-closed{background:var(--tx3)}
.b-critical{background:var(--rd)}.b-high{background:var(--or);color:#1a1a1a}
.b-medium{background:var(--yw);color:#1a1a1a}.b-low{background:var(--gn);color:#1a1a1a}
.pri{font-size:.8rem}
.sf{display:flex;flex-direction:column;height:100%}
.sf-hd{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--bd)}
.sf-hd h2{font-size:1rem;font-weight:700}
.sf-bd{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.sf-lb{display:flex;flex-direction:column;gap:5px;font-size:.76rem;font-weight:600;color:var(--tx2)}
.sf-in,.sf-ta,.sf-sel{padding:10px 12px;border-radius:var(--r);border:1px solid var(--bd);
  background:var(--bg);color:var(--tx);font-size:.88rem;outline:none;transition:var(--tr)}
.sf-ta{resize:vertical;min-height:80px;line-height:1.5}
.sf-in:focus,.sf-ta:focus,.sf-sel:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acg)}
.sf-sel{cursor:pointer}
.sf-obj{padding:10px 12px;background:var(--acg);border-radius:var(--r);font-size:.82rem;
  border:1px solid rgba(59,130,246,.2);display:flex;align-items:center;gap:8px}
.sf-ft{padding:14px 16px;border-top:1px solid var(--bd);display:flex;gap:8px}
.sf-ft .btn{flex:1}
.sd{display:flex;flex-direction:column;height:100%}
.sd-hd{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--bd)}
.sd-back{background:none;border:none;color:var(--ac);font-size:.84rem;font-weight:600;
  cursor:pointer;padding:4px 0}.sd-back:hover{color:var(--ac2)}
.sd-acts{display:flex;gap:8px}
.sd-bd{flex:1;overflow-y:auto;padding:16px}
.sd-bd h2{font-size:1.08rem;font-weight:700;line-height:1.35;margin-bottom:14px}
.sd-badges{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.sd-desc{font-size:.88rem;line-height:1.65;color:var(--tx);margin-bottom:22px}
.sd-sec{margin-bottom:18px}
.sd-sec h4{font-size:.72rem;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:8px;font-weight:600}
.sd-sec p{font-size:.84rem;line-height:1.5;margin-bottom:4px}
.pp{position:absolute;top:12px;left:12px;width:310px;max-height:calc(100% - 24px);
  overflow-y:auto;background:rgba(15,21,32,.94);border:1px solid var(--bd);border-radius:var(--rl);
  padding:18px;z-index:10;backdrop-filter:blur(12px);box-shadow:0 12px 40px rgba(0,0,0,.4);
  animation:slideIn .25s ease}
.pp-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.pp h3{font-size:.92rem;font-weight:700;flex:1;line-height:1.35}
.pp-x{background:none;border:none;color:var(--tx3);font-size:1.1rem;padding:0 2px;
  cursor:pointer;transition:var(--tr);line-height:1}.pp-x:hover{color:var(--tx)}
.pp-type{display:inline-block;padding:3px 10px;border-radius:6px;background:var(--acg);
  color:var(--ac);font-size:.68rem;font-weight:600;margin-bottom:14px;letter-spacing:.02em}
.pp-tbl{width:100%;border-collapse:collapse;margin-bottom:16px}
.pp-tbl td{padding:7px 0;font-size:.78rem;vertical-align:top;border-bottom:1px solid var(--bd)}
.pp-tbl td:first-child{color:var(--tx3);width:38%;font-weight:500}
.pp-tbl tr:last-child td{border-bottom:none}
.vb{position:absolute;bottom:14px;left:14px;background:rgba(15,21,32,.88);
  border:1px solid var(--bd);padding:7px 14px;border-radius:6px;font-size:.72rem;
  color:var(--tx3);pointer-events:none;z-index:5}
.vb-mode{color:var(--ac);font-weight:600}
.vh{position:absolute;top:14px;right:14px;background:rgba(15,21,32,.88);
  border:1px solid var(--bd);padding:10px 14px;border-radius:var(--r);font-size:.7rem;
  color:var(--tx3);z-index:5;line-height:1.6}
.vh b{color:var(--tx2)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--sf2);border:1px solid var(--bd);padding:10px 22px;border-radius:20px;
  font-size:.82rem;color:var(--tx);z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.4);
  animation:fadeInUp .3s ease;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@media(max-width:900px){.sb{width:340px;max-width:50vw}.pp{width:260px}}
@media(max-width:700px){.main{flex-direction:column}
  .sb{width:100%;max-width:100%;max-height:50vh;border-left:none;border-top:1px solid var(--bd)}
  .vw-wrap{min-height:45vh}.pp{width:calc(100% - 24px);max-width:340px}.hdr-u{display:none}}
</style>
</head>
<body>
<div id="app"></div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ═══════════════════════════════════════════════════
   GLOBAL STATE
   ═══════════════════════════════════════════════════ */
const S = {
  user: null,
  loginTab: 'login',
  project: null,
  issues: [],
  selObj: null,
  showForm: false,
  viewIssue: null,
  statusFlt: '',
  sbOpen: true,
  editMode: false,
};

/* ═══════════════════════════════════════════════════
   DATA
   ═══════════════════════════════════════════════════ */
const USERS = [
  { id:'u1', name:'Alex Morgan', email:'admin@demo.com', pass:'demo123', role:'admin' },
  { id:'u2', name:'Sam Chen', email:'user@demo.com', pass:'demo123', role:'user' },
];
const PROJECT = { id:'p1', name:'Riverside Office Complex', desc:'5-storey commercial — Phase 2 fit-out' };

function uid(){ return 'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8); }
function ago(d){ const t=new Date(); t.setDate(t.getDate()-d); return t.toISOString(); }
function fmtDate(s){ return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtDT(s){ return new Date(s).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
function esc(s){ if(!s)return''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function userName(id){ return USERS.find(u=>u.id===id)?.name||'Unknown'; }

function seedIssues(){
  return [
    {id:uid(),title:'Crack in load-bearing column B3',desc:'Visible 2 mm crack at base of column B3 on level 2 during routine inspection. Structural engineer review required. Crack follows aggregate boundary.',status:'open',priority:'critical',proj:'p1',by:'u1',obj:{id:330,label:'Column B3 — Central Corridor',type:'IfcColumn'},created:ago(2)},
    {id:uid(),title:'HVAC duct clash at grid C-4',desc:'Supply duct intersects sprinkler main at ceiling zone C-4. 150mm overlap in coordination model. Requires immediate re-routing.',status:'in_progress',priority:'high',proj:'p1',by:'u2',obj:{id:212,label:'Room 102 — East Office',type:'IfcSpace'},created:ago(5)},
    {id:uid(),title:'Missing fire door — Room 103',desc:'FD60s rated door required at Room 103 entrance per fire spec. Current opening has no door. Gap 1100×2100mm.',status:'open',priority:'high',proj:'p1',by:'u1',obj:{id:240,label:'Room 103 — Conference',type:'IfcSpace'},created:ago(1)},
    {id:uid(),title:'Paint mismatch — Level 1 corridor',desc:'Contractor applied RAL 9010 instead of RAL 9016 on corridor walls. Visible difference under LED lighting.',status:'resolved',priority:'low',proj:'p1',by:'u2',obj:{id:220,label:'Corridor — Central',type:'IfcSpace'},created:ago(12)},
    {id:uid(),title:'Electrical panel access blocked',desc:'Construction materials in front of main panel room. 1m clear space not maintained per IEC 60364.',status:'open',priority:'medium',proj:'p1',by:'u1',obj:{id:231,label:'Room 103 — Conference',type:'IfcSpace'},created:ago(3)},
    {id:uid(),title:'Window glazing seal failure',desc:'Double-glazed unit on north facade shows inter-pane condensation. Seal failure confirmed. Replacement needed.',status:'in_progress',priority:'medium',proj:'p1',by:'u2',obj:{id:113,label:'Room 101 — North Wall',type:'IfcWall'},created:ago(7)},
    {id:uid(),title:'Floor tile lippage — Entrance',desc:'Porcelain tiles at main entrance: 3-4mm lippage exceeds 2mm tolerance. Trip hazard. Grinding or replacement needed.',status:'open',priority:'high',proj:'p1',by:'u1',obj:{id:101,label:'Room 101 — Reception',type:'IfcSpace'},created:ago(0)},
  ];
}

function projIssues(){
  let list = S.issues.filter(i=>i.proj===S.project?.id);
  if(S.statusFlt) list = list.filter(i=>i.status===S.statusFlt);
  return list.sort((a,b)=>new Date(b.created)-new Date(a.created));
}

/* ═══════════════════════════════════════════════════
   PERSISTENCE
   ═══════════════════════════════════════════════════ */
function loadState(){
  try{
    const d = JSON.parse(localStorage.getItem('pp_v2'));
    if(d && d.issues) S.issues = d.issues;
    else S.issues = seedIssues();
    if(d && d.user) S.user = d.user;
  }catch{ S.issues = seedIssues(); }
}
function saveState(){
  try{ localStorage.setItem('pp_v2', JSON.stringify({user:S.user, issues:S.issues})); }catch{}
}

/* ═══════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════ */
function toast(msg){
  const old = document.querySelector('.toast');
  if(old) old.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2600);
}

/* ═══════════════════════════════════════════════════
   THREE.JS VIEWER
   ═══════════════════════════════════════════════════ */
let tScene, tCamera, tRenderer, tControls, tRaycaster, tMouse;
let tSelectables = [], tSelected = null, viewerReady = false, animId = null;

function destroyViewer(){
  if(animId) cancelAnimationFrame(animId);
  animId = null;
  if(tRenderer){
    tRenderer.dispose();
    const el = document.getElementById('viewer');
    if(el && tRenderer.domElement.parentNode===el) el.removeChild(tRenderer.domElement);
  }
  tScene = null; tCamera = null; tRenderer = null; tControls = null;
  tSelectables = []; tSelected = null; viewerReady = false;
}

function initViewer(){
  const el = document.getElementById('viewer');
  if(!el || viewerReady) return;

  tScene = new THREE.Scene();
  tScene.background = new THREE.Color(0x080c14);
  tScene.fog = new THREE.FogExp2(0x080c14, 0.012);

  const w = el.clientWidth || 800, h = el.clientHeight || 600;
  tCamera = new THREE.PerspectiveCamera(50, w/h, 0.1, 500);
  tCamera.position.set(18, 14, 22);

  tRenderer = new THREE.WebGLRenderer({antialias:true});
  tRenderer.setSize(w, h);
  tRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  tRenderer.toneMapping = THREE.ACESFilmicToneMapping;
  tRenderer.toneMappingExposure = 1.1;
  tRenderer.shadowMap.enabled = true;
  tRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
  el.appendChild(tRenderer.domElement);

  tControls = new OrbitControls(tCamera, tRenderer.domElement);
  tControls.enableDamping = true;
  tControls.dampingFactor = 0.06;
  tControls.target.set(0, 1.6, 0);
  tControls.maxPolarAngle = Math.PI * 0.48;
  tControls.minDistance = 4;
  tControls.maxDistance = 60;

  // Lights
  tScene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const sun = new THREE.DirectionalLight(0xfff4e0, 1.0);
  sun.position.set(15, 22, 10);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left = -20; sun.shadow.camera.right = 20;
  sun.shadow.camera.top = 20; sun.shadow.camera.bottom = -20;
  tScene.add(sun);
  tScene.add(new THREE.HemisphereLight(0x87ceeb, 0x2d1f0e, 0.3));
  const fill = new THREE.DirectionalLight(0x6699cc, 0.2);
  fill.position.set(-10, 8, -10);
  tScene.add(fill);

  // Ground
  const gnd = new THREE.Mesh(
    new THREE.PlaneGeometry(80, 80),
    new THREE.MeshStandardMaterial({color:0x0d1117, roughness:0.95})
  );
  gnd.rotation.x = -Math.PI/2; gnd.position.y = -0.02; gnd.receiveShadow = true;
  tScene.add(gnd);
  tScene.add(new THREE.GridHelper(60, 60, 0x162030, 0x0e1520));

  buildDemo(tScene);

  tRaycaster = new THREE.Raycaster();
  tMouse = new THREE.Vector2();

  function animate() {
    animId = requestAnimationFrame(animate);
    if(tControls) tControls.update();
    if(tRenderer && tScene && tCamera) tRenderer.render(tScene, tCamera);
  }
  animate();
  viewerReady = true;

  const onResize = () => {
    const nw = el.clientWidth, nh = el.clientHeight;
    if(nw > 0 && nh > 0 && tCamera){ tCamera.aspect = nw/nh; tCamera.updateProjectionMatrix(); tRenderer.setSize(nw, nh); }
  };
  window.addEventListener('resize', onResize);

  tRenderer.domElement.addEventListener('click', (e) => {
    if(!tRaycaster || !tCamera) return;
    const r = tRenderer.domElement.getBoundingClientRect();
    tMouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    tMouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
    tRaycaster.setFromCamera(tMouse, tCamera);
    const hits = tRaycaster.intersectObjects(tSelectables, false);
    if(hits.length > 0){
      selectMesh(hits[0].object);
    } else {
      deselectMesh();
      S.selObj = null;
      render();
    }
  });
}

function buildDemo(scene){
  const WH = 3.4, WT = 0.2;
  let eid = 100;

  const wallMat = new THREE.MeshStandardMaterial({color:0x4a5a72, roughness:0.82, metalness:0.05});
  const ceilMat = new THREE.MeshStandardMaterial({color:0x151d2a, roughness:0.92, side:THREE.DoubleSide});
  const colMat = new THREE.MeshStandardMaterial({color:0x7a8a9a, roughness:0.45, metalness:0.35});
  const doorMat = new THREE.MeshStandardMaterial({color:0x8b6914, roughness:0.65, metalness:0.1});
  const roofMat = new THREE.MeshStandardMaterial({color:0x2a3448, roughness:0.85});
  const stairMat = new THREE.MeshStandardMaterial({color:0x3a4858, roughness:0.75});
  const claddingMat = new THREE.MeshStandardMaterial({color:0x3a4a62, roughness:0.7, metalness:0.15, transparent:true, opacity:0.3});

  function bx(w,h,d){ return new THREE.BoxGeometry(w,h,d); }
  function mk(geom, mat, pos, rotY, ud){
    const m = new THREE.Mesh(geom, mat);
    m.position.set(pos[0], pos[1], pos[2]);
    if(rotY) m.rotation.y = rotY;

function selectMesh(m){
  deselectMesh();
  tSelected = m;
  m.userData._c = m.material.color.getHex();
  m.userData._e = m.material.emissive ? m.material.emissive.getHex() : 0;
  m.userData._o = m.material.opacity;
  m.userData._t = m.material.transparent;
  m.material.color.setHex(0x3b82f6);
  if(m.material.emissive) m.material.emissive.setHex(0x1a3a6e);
  m.material.transparent = true;
  m.material.opacity = 1;
  S.selObj = {
    expressId: m.userData.eid,
    label: m.userData.label,
    type: m.userData.type,
    props: m.userData.props || {},
    level: m.userData.level || 'Ground Floor',
    material: m.userData.material || '—'
  };
  render();
}

function deselectMesh(){
  if(!tSelected) return;
  const m = tSelected;
  if(m.userData._c !== undefined){
    m.material.color.setHex(m.userData._c);
    if(m.material.emissive) m.material.emissive.setHex(m.userData._e || 0);
    m.material.opacity = m.userData._o ?? 1;
    m.material.transparent = m.userData._t ?? false;
  }
  tSelected = null;
}

function renderLogin(){
  const reg = S.loginTab === 'register';
  $.innerHTML = `
  <div class="lp"><div class="lc">
    <div class="lc-ico">🏗️</div>
    <h1>PropertyPulse</h1>
    <p class="lc-sub">IFC Viewer & Issue Tracker</p>
    <form id="loginForm" autocomplete="off">
      ${reg ? `<div class="fg"><label>Full Name</label>
        <input class="fi" id="fName" placeholder="Your name" required></div>` : ''}
      <div class="fg"><label>Email</label>
        <input class="fi" id="fEmail" type="email" placeholder="you@company.com" required></div>
      <div class="fg"><label>Password</label>
        <input class="fi" id="fPass" type="password" placeholder="••••••••" required minlength="6"></div>
      <div id="formError"></div>
      <button class="btn btn-p btn-f" type="submit" id="formBtn">${reg ? 'Create Account' : 'Sign In'}</button>
    </form>
    <div class="lc-foot">
      ${reg ? 'Already have an account?' : "Don't have an account?"}
      <button id="toggleTab">${reg ? 'Sign in' : 'Register'}</button>
    </div>
    <div class="lc-demo"><p>Demo Credentials</p>
      <code>admin@demo.com / demo123</code></div>
  </div></div>`;

  const form = document.getElementById('loginForm');
  const errDiv = document.getElementById('formError');
  const emailEl = document.getElementById('fEmail');
  const passEl = document.getElementById('fPass');
  const nameEl = document.getElementById('fName');

  form.addEventListener('submit', function(e){
    e.preventDefault();
    e.stopPropagation();
    errDiv.innerHTML = '';

    const email = emailEl.value.trim();
    const pass = passEl.value;

    if(!email || !pass){
      errDiv.innerHTML = '<div class="err">Please fill in all fields.</div>';
      return;
    }

    if(reg){
      const name = nameEl ? nameEl.value.trim() : '';
      if(!name){
        errDiv.innerHTML = '<div class="err">Name is required.</div>';
        return;
      }
      if(USERS.find(u => u.email === email)){
        errDiv.innerHTML = '<div class="err">An account with this email already exists.</div>';
        return;
      }
      const newUser = { id:uid(), name, email, pass, role:'user' };
      USERS.push(newUser);
      S.user = newUser;
      saveState();
      toast('Account created! Welcome, ' + name.split(' ')[0] + '!');
      render();
    } else {
      const found = USERS.find(u => u.email === email && u.pass === pass);
      if(!found){
        errDiv.innerHTML = '<div class="err">Invalid email or password. Try: admin@demo.com / demo123</div>';
        return;
      }
      S.user = found;
      saveState();
      toast('Welcome back, ' + found.name.split(' ')[0] + '!');
      render();
    }
  });

  document.getElementById('toggleTab').addEventListener('click', function(){
    S.loginTab = reg ? 'login' : 'register';
    render();
  });
}

/* ═══════════════════════════════════════════════════
   SIDEBAR EVENT BINDING
   ═══════════════════════════════════════════════════ */
function bindSidebar(){
  // Property panel buttons
  const ppClose = document.getElementById('ppClose');
  if(ppClose) ppClose.addEventListener('click', () => { S.selObj = null; deselectMesh(); render(); });
  const ppCreate = document.getElementById('ppCreate');
  if(ppCreate) ppCreate.addEventListener('click', () => { S.showForm = true; S.editMode = false; render(); });

  // Issue list
  const btnNew = document.getElementById('btnNew');
  if(btnNew) btnNew.addEventListener('click', () => { S.showForm = true; S.editMode = false; render(); });

  // Filter buttons
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', function(){
      S.statusFlt = this.dataset.filter;
      render();
    });
  });

  // Issue cards
  document.querySelectorAll('[data-issue-id]').forEach(card => {
    card.addEventListener('click', function(){
      const issue = S.issues.find(i => i.id === this.dataset.issueId);
      if(issue){ S.viewIssue = issue; S.showForm = false; S.editMode = false; render(); }
    });
  });

  // Form
  const btnCancel = document.getElementById('btnCancelForm');
  if(btnCancel) btnCancel.addEventListener('click', () => { S.showForm = false; render(); });

  const btnSubmit = document.getElementById('btnSubmitIssue');
  if(btnSubmit) btnSubmit.addEventListener('click', () => {
    const title = document.getElementById('issueTitle')?.value.trim();
    if(!title){ toast('Title is required'); return; }
    const desc = document.getElementById('issueDesc')?.value.trim() || '';
    const pri = document.getElementById('issuePri')?.value || 'medium';
    const status = document.getElementById('issueStatus')?.value || 'open';
    const issue = {
      id: uid(), title: title, desc: desc, status: status, priority: pri,
      proj: S.project.id, by: S.user.id,
      obj: S.selObj ? { id: S.selObj.expressId, label: S.selObj.label, type: S.selObj.type } : null,
      created: new Date().toISOString()
    };
    S.issues.unshift(issue);
    saveState();
    S.showForm = false;
    S.viewIssue = issue;
    S.editMode = false;
    toast('Issue created!');
    render();
  });

  // Detail
  const btnBack = document.getElementById('btnBackList');
  if(btnBack) btnBack.addEventListener('click', () => { S.viewIssue = null; S.editMode = false; render(); });

  const btnEdit = document.getElementById('btnToggleEdit');
  if(btnEdit) btnEdit.addEventListener('click', () => { S.editMode = !S.editMode; render(); });

  const btnSave = document.getElementById('btnSaveEdit');
  if(btnSave) btnSave.addEventListener('click', () => {
    const ns = document.getElementById('editStatus')?.value;
    const np = document.getElementById('editPri')?.value;
    const idx = S.issues.findIndex(i => i.id === S.viewIssue.id);
    if(idx >= 0){
      S.issues[idx].status = ns;
      S.issues[idx].priority = np;
      S.issues[idx].updated = new Date().toISOString();
      S.viewIssue = S.issues[idx];
      S.editMode = false;
      saveState();
      toast('Issue updated!');
      render();
    }
  });

  const btnDel = document.getElementById('btnDelete');
  if(btnDel) btnDel.addEventListener('click', () => {
    if(!confirm('Delete this issue permanently?')) return;
    S.issues = S.issues.filter(i => i.id !== S.viewIssue.id);
    saveState();
    S.viewIssue = null;
    S.editMode = false;
    toast('Issue deleted');
    render();
  });
}
